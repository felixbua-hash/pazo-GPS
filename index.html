<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e3a23" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pazo Baion GPS" />
  <title>Pazo Baion GPS Beta 0.2</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" aria-label="Pazo Baion GPS Beta 0.2">
    <section id="phone" class="phone-frame" aria-live="polite">
      <img id="screenImage" class="screen-image" src="assets/splash.png" alt="Pantalla Pazo Baion GPS" draggable="false" />
      <div id="hotspots" class="hotspots" aria-hidden="false"></div>
      <div id="statusToast" class="status-toast" hidden></div>
    </section>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
